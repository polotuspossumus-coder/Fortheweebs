<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Access - ForTheWeebs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }
        .container {
            background: rgba(0, 0, 0, 0.6);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid #FFD700;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 30px;
            color: #FFD700;
        }
        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); }
        .info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 8px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👑 Owner Access</h1>
        <p style="margin-bottom: 20px; color: #aaa;">
            Click below to activate owner access for<br>
            <strong style="color: #FFD700;">polotuspossumus@gmail.com</strong>
        </p>
        <button onclick="activateOwner()">🔓 Activate Owner Access</button>
        <div class="info">Only you (the owner) can use this page</div>
    </div>

    <script>
        function activateOwner() {
            localStorage.setItem('userId', 'owner');
            localStorage.setItem('ownerEmail', 'polotuspossumus@gmail.com');
            localStorage.setItem('adminAuthenticated', 'true');
            localStorage.setItem('hasOnboarded', 'true');
            localStorage.setItem('legalAccepted', 'true');
            localStorage.setItem('tosAccepted', 'true');
            localStorage.setItem('privacyAccepted', 'true');
            localStorage.setItem('userTier', 'LIFETIME_VIP');
            
            alert('✅ Owner access activated!');
            window.location.href = '/';
        }
    </script>
</body>
</html>
