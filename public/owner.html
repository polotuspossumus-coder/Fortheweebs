<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForTheWeebs - Owner Access</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #667eea;
            font-size: 48px;
            margin-bottom: 10px;
        }
        h2 {
            color: #333;
            font-size: 28px;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            font-size: 18px;
            margin-bottom: 40px;
        }
        button {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
        }
        button:active {
            transform: translateY(-1px);
        }
        .success {
            display: none;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-top: 30px;
            font-size: 18px;
            font-weight: 600;
            animation: slideIn 0.5s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .success.show {
            display: block;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>👑</h1>
        <h2>Owner Access</h2>
        <p>Click below to restore your full admin access</p>
        <button onclick="restoreOwner()" id="btn">Restore Admin Access</button>
        <div class="success" id="success">
            ✅ Admin access restored!<br>
            Redirecting to dashboard<span class="loading"></span>
        </div>
    </div>

    <script>
        function restoreOwner() {
            const btn = document.getElementById('btn');
            const success = document.getElementById('success');
            
            btn.disabled = true;
            btn.innerHTML = 'Restoring<span class="loading"></span>';
            
            // Set all owner keys
            localStorage.setItem('userId', 'owner');
            localStorage.setItem('ownerEmail', 'polotuspossumus@gmail.com');
            localStorage.setItem('adminAuthenticated', 'true');
            localStorage.setItem('ownerVerified', 'true');
            localStorage.setItem('hasOnboarded', 'true');
            localStorage.setItem('legalAccepted', 'true');
            localStorage.setItem('tosAccepted', 'true');
            localStorage.setItem('privacyAccepted', 'true');
            localStorage.setItem('userTier', 'LIFETIME_VIP');
            
            setTimeout(() => {
                btn.style.display = 'none';
                success.classList.add('show');
                
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
            }, 500);
        }
    </script>
</body>
</html>
