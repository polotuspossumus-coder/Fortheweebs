<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ForTheWeebs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .quick-login {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e1e8ed;
            text-align: center;
        }

        .quick-login p {
            color: #666;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .quick-btn {
            background: #f0f0f0;
            color: #333;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .quick-btn:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🎌 ForTheWeebs</h1>
            <p>Admin Access Portal</p>
        </div>

        <div class="error-message" id="errorMessage">
            Invalid credentials. Please try again.
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username or Email</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="polotuspossumus or polotuspossumus@gmail.com"
                    autocomplete="username"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your password"
                    autocomplete="current-password"
                    required
                >
            </div>

            <button type="submit" class="login-btn">
                Login to Dashboard
            </button>
        </form>

        <div class="quick-login">
            <p>Quick Access (Development)</p>
            <button class="quick-btn" onclick="quickLogin()">Auto-Login as Owner</button>
        </div>
    </div>

    <script>
        const VALID_USERNAME = 'polotuspossumus';
        const VALID_EMAIL = 'polotuspossumus@gmail.com';
        const VALID_PASSWORD = 'Scorpio#96';

        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            // Check if credentials match
            const isValidUsername = username === VALID_USERNAME || username === VALID_EMAIL;
            const isValidPassword = password === VALID_PASSWORD;

            if (isValidUsername && isValidPassword) {
                // Set admin access
                localStorage.setItem('userId', 'owner');
                localStorage.setItem('ownerEmail', VALID_EMAIL);
                localStorage.setItem('adminAccess', 'true');
                localStorage.setItem('lastLogin', new Date().toISOString());

                // Redirect to dashboard
                window.location.href = '/?app=true';
            } else {
                // Show error
                errorMessage.classList.add('show');
                passwordInput.value = '';
                passwordInput.focus();

                // Hide error after 3 seconds
                setTimeout(() => {
                    errorMessage.classList.remove('show');
                }, 3000);
            }
        });

        // Quick login function for development
        function quickLogin() {
            localStorage.setItem('userId', 'owner');
            localStorage.setItem('ownerEmail', VALID_EMAIL);
            localStorage.setItem('adminAccess', 'true');
            localStorage.setItem('lastLogin', new Date().toISOString());
            window.location.href = '/?app=true';
        }

        // Auto-focus username field
        usernameInput.focus();

        // Check if already logged in
        if (localStorage.getItem('adminAccess') === 'true') {
            const lastLogin = localStorage.getItem('lastLogin');
            const oneDay = 24 * 60 * 60 * 1000;
            
            if (lastLogin && (new Date() - new Date(lastLogin)) < oneDay) {
                window.location.href = '/?app=true';
            }
        }
    </script>
</body>
</html>
