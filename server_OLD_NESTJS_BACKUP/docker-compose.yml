version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fortheweebs-postgres
    environment:
      POSTGRES_USER: fortheweebs
      POSTGRES_PASSWORD: fortheweebs_password
      POSTGRES_DB: fortheweebs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fortheweebs-network

  redis:
    image: redis:7-alpine
    container_name: fortheweebs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fortheweebs-network

volumes:
  postgres_data:
  redis_data:

networks:
  fortheweebs-network:
    driver: bridge
