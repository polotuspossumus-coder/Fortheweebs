<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One-Click Owner Setup</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .container {
            text-align: center;
            padding: 60px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            border: 3px solid #FFD700;
            max-width: 500px;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: 900;
            color: #000;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 40px;
        }

        button {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 1.3rem;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.5);
        }

        #status {
            margin-top: 30px;
            font-size: 1.1rem;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .success {
            background: rgba(74, 222, 128, 0.3);
            border: 2px solid #4ade80;
            color: #4ade80;
            display: block;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="badge">👑 OWNER ACCESS 👑</div>
        <h1>One-Click Setup</h1>
        <p>Click the button below to activate permanent owner access</p>

        <button onclick="activateOwnerAccess()">
            🚀 ACTIVATE OWNER ACCESS
        </button>

        <div id="status"></div>
    </div>

    <script>
        function activateOwnerAccess() {
            const statusEl = document.getElementById('status');
            const button = document.querySelector('button');

            button.disabled = true;
            button.textContent = '⏳ Setting up...';

            // Set permanent owner credentials
            localStorage.setItem('adminAuthenticated', 'true');
            localStorage.setItem('userId', 'owner');
            localStorage.setItem('adminDeviceId', 'owner_permanent_device');
            localStorage.setItem('adminPhoneNumber', '+12813819498');

            // Add authorized device
            localStorage.setItem('authorized_devices', JSON.stringify([{
                deviceId: 'owner_permanent_device',
                deviceType: 'desktop',
                addedAt: Date.now(),
                lastUsed: Date.now()
            }]));

            // Show success
            statusEl.className = 'success';
            statusEl.textContent = '✅ Owner access activated! Redirecting...';

            // Redirect to main site
            setTimeout(() => {
                window.location.href = '/';
            }, 1500);
        }
    </script>
</body>

</html>
