<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Login - ForTheWeebs</title>
</head>
<body>
    <h1>Verifying access...</h1>
    <script>
        // Security: Prompt for password before granting owner access
        const password = prompt('Enter owner password:');
        
        // Simple password check (replace 'yourpassword' with your actual password)
        if (password === 'ownerpass2024') {
            localStorage.setItem('userId', 'owner');
            localStorage.setItem('userTier', 'owner');
            localStorage.setItem('tosAccepted', 'true');
            localStorage.setItem('creatorAgreementAccepted', 'true');
            
            setTimeout(() => {
                window.location.href = '/';
            }, 500);
        } else {
            alert('Access denied. Incorrect password.');
            window.location.href = '/';
        }
    </script>
</body>
</html>
