<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Status Check</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: 'Courier New', monospace;
            color: #fff;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.7);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #FFD700;
        }

        h1 {
            color: #FFD700;
            text-align: center;
            margin-bottom: 30px;
        }

        .status-item {
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #666;
        }

        .status-item.good {
            border-left-color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
        }

        .status-item.bad {
            border-left-color: #f87171;
            background: rgba(248, 113, 113, 0.1);
        }

        .label {
            color: #FFD700;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .value {
            color: #fff;
            font-size: 1.1rem;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .fix-btn {
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>👑 Owner Access Status Check</h1>
        <div id="status"></div>
        <button class="fix-btn" onclick="fixAccess()">🔧 FIX OWNER ACCESS NOW</button>
        <button onclick="location.reload()">🔄 Refresh Status</button>
        <button onclick="location.href='/'">🏠 Go to Main Site</button>
    </div>

    <script>
        function checkStatus() {
            const statusEl = document.getElementById('status');
            let html = '';

            // Check all localStorage values
            const userId = localStorage.getItem('userId');
            const adminAuth = localStorage.getItem('adminAuthenticated');
            const deviceId = localStorage.getItem('adminDeviceId');
            const devices = localStorage.getItem('authorized_devices');

            // User ID
            html += `<div class="status-item ${userId === 'owner' ? 'good' : 'bad'}">
                <div class="label">User ID:</div>
                <div class="value">${userId || 'NOT SET ❌'}</div>
                <div style="color: #aaa; font-size: 0.9rem; margin-top: 5px;">
                    ${userId === 'owner' ? '✅ Correct - You are the owner' : '❌ Should be "owner"'}
                </div>
            </div>`;

            // Admin Auth
            html += `<div class="status-item ${adminAuth === 'true' ? 'good' : 'bad'}">
                <div class="label">Admin Authenticated:</div>
                <div class="value">${adminAuth || 'NOT SET ❌'}</div>
                <div style="color: #aaa; font-size: 0.9rem; margin-top: 5px;">
                    ${adminAuth === 'true' ? '✅ You are authenticated' : '❌ Should be "true"'}
                </div>
            </div>`;

            // Device ID
            html += `<div class="status-item ${deviceId ? 'good' : 'bad'}">
                <div class="label">Device ID:</div>
                <div class="value">${deviceId || 'NOT SET ❌'}</div>
                <div style="color: #aaa; font-size: 0.9rem; margin-top: 5px;">
                    ${deviceId ? '✅ Device registered' : '❌ Device not registered'}
                </div>
            </div>`;

            // Authorized Devices
            html += `<div class="status-item ${devices ? 'good' : 'bad'}">
                <div class="label">Authorized Devices:</div>
                <div class="value">${devices ? 'SET ✅' : 'NOT SET ❌'}</div>
                <div style="color: #aaa; font-size: 0.9rem; margin-top: 5px;">
                    ${devices ? '✅ Device list configured' : '❌ Device list missing'}
                </div>
            </div>`;

            // Overall Status
            const allGood = userId === 'owner' && adminAuth === 'true' && deviceId && devices;

            html = `<div class="status-item ${allGood ? 'good' : 'bad'}" style="margin-bottom: 20px; font-size: 1.2rem;">
                <div class="label">Overall Status:</div>
                <div class="value">${allGood ? '✅ OWNER ACCESS ACTIVE' : '❌ OWNER ACCESS NOT ACTIVE'}</div>
            </div>` + html;

            statusEl.innerHTML = html;
        }

        function fixAccess() {
            console.log('Fixing owner access...');

            // Set all required values
            localStorage.setItem('userId', 'owner');
            localStorage.setItem('adminAuthenticated', 'true');
            localStorage.setItem('adminDeviceId', 'owner_permanent_device');
            localStorage.setItem('authorized_devices', JSON.stringify([{
                deviceId: 'owner_permanent_device',
                deviceType: 'desktop',
                addedAt: Date.now(),
                lastUsed: Date.now()
            }]));

            alert('✅ Owner access fixed! The page will refresh to show updated status.');
            location.reload();
        }

        // Check status on load
        checkStatus();
    </script>
</body>

</html>
