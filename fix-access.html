<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForTheWeebs - Access Fix</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            margin: 0 0 20px 0;
            font-size: 28px;
        }
        .status {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            max-height: 400px;
            overflow-y: auto;
        }
        .log-entry {
            padding: 8px;
            margin: 4px 0;
            border-radius: 4px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
        }
        .log-entry.success {
            background: #d4edda;
            color: #155724;
        }
        .log-entry.info {
            background: #d1ecf1;
            color: #0c5460;
        }
        .log-entry.warning {
            background: #fff3cd;
            color: #856404;
        }
        .progress {
            margin: 20px 0;
        }
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e9ecef;
            border-radius: 15px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 ForTheWeebs Access Fix</h1>
        <p>This will clear all cache and restore your owner access with VIP privileges.</p>
        
        <div class="progress">
            <div class="progress-bar">
                <div class="progress-fill" id="progress">0%</div>
            </div>
        </div>
        
        <div class="status" id="status"></div>
        
        <button class="btn" id="reloadBtn" style="display: none;">Reload Now</button>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        const progressFill = document.getElementById('progress');
        const reloadBtn = document.getElementById('reloadBtn');
        let progress = 0;

        function log(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = message;
            statusDiv.appendChild(entry);
            statusDiv.scrollTop = statusDiv.scrollHeight;
            console.log(message);
        }

        function updateProgress(percent, message) {
            progress = percent;
            progressFill.style.width = percent + '%';
            progressFill.textContent = percent + '%';
            if (message) log(message, 'info');
        }

        async function runFix() {
            try {
                log('🚀 Starting comprehensive fix...', 'info');
                updateProgress(10, '');

                // Step 1: Clear localStorage
                log('Clearing localStorage...', 'info');
                localStorage.clear();
                updateProgress(20, '✅ localStorage cleared');

                // Step 2: Clear sessionStorage
                log('Clearing sessionStorage...', 'info');
                sessionStorage.clear();
                updateProgress(30, '✅ sessionStorage cleared');

                // Step 3: Set owner access
                log('Setting owner access flags...', 'info');
                localStorage.setItem('ownerEmail', 'polotuspossumus@gmail.com');
                localStorage.setItem('userId', 'owner');
                localStorage.setItem('adminAuthenticated', 'true');
                localStorage.setItem('ownerVerified', 'true');
                localStorage.setItem('hasOnboarded', 'true');
                localStorage.setItem('legalAccepted', 'true');
                localStorage.setItem('tosAccepted', 'true');
                localStorage.setItem('userTier', 'LIFETIME_VIP');
                updateProgress(50, '✅ Owner access restored');

                // Step 4: Clear service worker caches
                if ('caches' in window) {
                    log('Clearing service worker caches...', 'info');
                    const cacheNames = await caches.keys();
                    let cleared = 0;
                    for (const cacheName of cacheNames) {
                        await caches.delete(cacheName);
                        cleared++;
                        log(`  Deleted cache: ${cacheName}`, 'success');
                    }
                    updateProgress(70, `✅ Cleared ${cleared} cache(s)`);
                } else {
                    updateProgress(70, '⚠️ Service worker caches not available');
                }

                // Step 5: Unregister service workers
                if ('serviceWorker' in navigator) {
                    log('Unregistering service workers...', 'info');
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    for (const registration of registrations) {
                        await registration.unregister();
                        log('  Unregistered service worker', 'success');
                    }
                    updateProgress(85, `✅ Unregistered ${registrations.length} service worker(s)`);
                } else {
                    updateProgress(85, '⚠️ Service workers not available');
                }

                // Step 6: Complete
                updateProgress(100, '✅ ALL FIXES APPLIED SUCCESSFULLY!');
                log('', 'info');
                log('🎉 Your owner access has been restored!', 'success');
                log('🎉 All caches have been cleared!', 'success');
                log('🎉 Ready to reload with fresh deployment!', 'success');
                
                // Show reload button
                reloadBtn.style.display = 'block';
                
                // Auto reload after 3 seconds
                let countdown = 3;
                const countdownInterval = setInterval(() => {
                    reloadBtn.textContent = `Reloading in ${countdown}s... (or click now)`;
                    countdown--;
                    if (countdown < 0) {
                        clearInterval(countdownInterval);
                        window.location.href = '/';
                    }
                }, 1000);
                
                reloadBtn.onclick = () => {
                    clearInterval(countdownInterval);
                    window.location.href = '/';
                };

            } catch (error) {
                log(`❌ Error: ${error.message}`, 'warning');
                console.error('Fix error:', error);
            }
        }

        // Start automatically on load
        window.addEventListener('load', () => {
            setTimeout(runFix, 500);
        });
    </script>
</body>
</html>
